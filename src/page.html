<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://js.arcgis.com/4.34/esri/themes/light/main.css">
  <script src="https://js.arcgis.com/4.34/"></script>
  <style>
    html, body, #viewDiv {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <div id="viewDiv"></div>
  <script>
    require([
      "esri/WebMap",
      "esri/views/MapView",
      "esri/layers/GraphicsLayer",
      "esri/Graphic",
      "esri/geometry/Point",
      "esri/geometry/Polygon",
      "esri/geometry/Polyline",
      "esri/geometry/Circle",
      "esri/geometry/Extent",
      "esri/symbols/SimpleFillSymbol",
      "esri/symbols/SimpleMarkerSymbol",
      "esri/symbols/SimpleLineSymbol",
      "esri/symbols/TextSymbol",
      "esri/rest/locator",
      "esri/Color"
    ], function(
      WebMap, MapView, GraphicsLayer, Graphic,
      Point, Polygon, Polyline, Circle, Extent,
      SimpleFillSymbol, SimpleMarkerSymbol, SimpleLineSymbol, TextSymbol,
      locator, Color
    ) {
      var params = new URLSearchParams(window.location.search);
      var currentWebmapId = params.get("webmap");

      var webmap = new WebMap({ portalItem: { id: currentWebmapId } });
      var highlightLayer = new GraphicsLayer({ title: "_highlights", listMode: "hide" });
      var overlayGroup = new GraphicsLayer({ title: "_overlays", listMode: "hide" });
      var annotationLayer = new GraphicsLayer({ title: "_annotations", listMode: "hide" });

      var view = new MapView({
        container: "viewDiv",
        map: webmap,
        ui: { components: [] }
      });

      // Overlay layers added after view.when() to ensure they're on top of all web map layers

      // Swap web map without full page reload — preserves view extent and overlay layers
      async function swapWebMap(newId) {
        if (newId === currentWebmapId) return;
        var center = [view.center.longitude, view.center.latitude];
        var zoom = view.zoom;
        var newMap = new WebMap({ portalItem: { id: newId } });
        await newMap.load();
        view.map = newMap;
        webmap = newMap;
        currentWebmapId = newId;
        await view.when();
        pushOverlaysToTop();
        // MapView animation controller needs a tick after when() before goTo works
        await new Promise(function(r) { setTimeout(r, 500); });
        await view.goTo({ center: center, zoom: zoom }, { duration: 0 });
        await waitForTiles();
        console.log("Swapped to web map: " + newId);
      }

      // Force overlay layers to the top of the draw stack
      function pushOverlaysToTop() {
        var layers = webmap.layers;
        [highlightLayer, overlayGroup, annotationLayer].forEach(function(gl) {
          if (layers.includes(gl)) layers.remove(gl);
          layers.add(gl);
        });
      }

      function findParcelLayer() {
        var found = null;
        webmap.allLayers.forEach(function(l) {
          if (!found && l.type === "feature" && l.title && l.title.toLowerCase().includes("parcel")) {
            found = l;
          }
        });
        return found;
      }

      function getLayerInfo(detailed) {
        var result = [];
        webmap.allLayers.forEach(function(l) {
          if (l.title && !l.title.startsWith("_")) {
            var info = { title: l.title, visible: l.visible, type: l.type };
            if (l.url) info.url = l.url;
            if (detailed && l.fields && l.fields.length) {
              info.fields = l.fields.map(function(f) {
                return { name: f.name, alias: f.alias, type: f.type };
              });
            }
            result.push(info);
          }
        });
        return result;
      }

      function waitForTiles(timeout) {
        timeout = timeout || 10000;
        return new Promise(function(resolve) {
          if (!view.updating) { setTimeout(resolve, 100); return; }
          var timer = setTimeout(function() { resolve(); }, timeout);
          var handle = view.watch("updating", function(updating) {
            if (!updating) {
              handle.remove();
              clearTimeout(timer);
              setTimeout(resolve, 100);
            }
          });
        });
      }

      webmap.load().then(function() {
        console.log("WebMap loaded: " + webmap.portalItem.title);
      }).catch(function(err) {
        console.error("WebMap load FAILED: " + (err.message || err));
        document.title = "ERROR";
      });

      view.when(function() {
        console.log("MapView ready");
        document.title = "READY";

        // Add overlay layers on top of all web map layers
        webmap.addMany([highlightLayer, overlayGroup, annotationLayer]);
        pushOverlaysToTop();

        window.waitForTiles = waitForTiles;
        window.swapWebMap = swapWebMap;
        window.currentWebmapId = function() { return currentWebmapId; };

        // --- Navigation ---
        window.atlasGoTo = async function(target) {
          if (target.webmap) {
            await swapWebMap(target.webmap);
          }

          if (target.apn) {
            var parcelLayer = findParcelLayer();
            if (!parcelLayer) throw new Error("No parcel layer in current web map");

            var clean = target.apn.replace(/-/g, "");
            var query = parcelLayer.createQuery();
            query.where = "asmtnum = '" + clean.replace(/'/g, "''") + "'";
            query.returnGeometry = true;
            query.outSpatialReference = view.spatialReference;
            var result = await parcelLayer.queryFeatures(query);
            if (result.features.length === 0) throw new Error("APN not found: " + target.apn);

            var extent = result.features[0].geometry.extent;
            await view.goTo({ target: extent.expand(1.5) }, { duration: 0 });
            if (target.zoom) await view.goTo({ zoom: target.zoom }, { duration: 0 });
          } else if (target.address) {
            var results = await locator.addressToLocations(
              "https://solanocountygis.com/server/rest/services/Solano_Public_Locator/GeocodeServer",
              { address: { SingleLine: target.address }, maxLocations: 1, outSpatialReference: { wkid: 4326 } }
            );
            if (results.length === 0) throw new Error("Address not found: " + target.address);
            var loc = results[0].location;
            await view.goTo({ center: [loc.longitude, loc.latitude], zoom: target.zoom || 17 }, { duration: 0 });
          } else if (target.extent) {
            var parts = target.extent;
            var ext = new Extent({
              xmin: parts[0], ymin: parts[1], xmax: parts[2], ymax: parts[3],
              spatialReference: { wkid: 4326 }
            });
            await view.goTo(ext, { duration: 0 });
          } else if (target.pixel) {
            // Convert screen pixel [x, y] to map coordinates and center there
            var mapPoint = view.toMap({ x: target.pixel[0], y: target.pixel[1] });
            if (!mapPoint) throw new Error("Pixel outside map view: " + target.pixel);
            await view.goTo({
              center: mapPoint,
              zoom: target.zoom || view.zoom
            }, { duration: 0 });
          } else if (target.center) {
            await view.goTo({
              center: target.center,
              zoom: target.zoom || 15
            }, { duration: 0 });
          }

          await waitForTiles();
          return {
            center: [view.center.longitude, view.center.latitude],
            zoom: view.zoom,
            scale: view.scale
          };
        };

        // --- Zoom ---
        window.atlasZoom = async function(direction, levels) {
          levels = levels || 2;
          var newZoom = direction === "in" ? view.zoom + levels : view.zoom - levels;
          await view.goTo({ zoom: Math.max(1, Math.min(23, newZoom)) }, { duration: 0 });
          await waitForTiles();
          return { zoom: view.zoom, scale: view.scale };
        };

        // --- Layer Control ---
        window.atlasLayers = async function(show, hide, detailed) {
          webmap.allLayers.forEach(function(layer) {
            if (layer.title && !layer.title.startsWith("_")) {
              if (show && show.includes(layer.title)) layer.visible = true;
              if (hide && hide.includes(layer.title)) layer.visible = false;
            }
          });
          if (show || hide) await waitForTiles();
          return getLayerInfo(detailed);
        };

        // --- Measure ---
        window.atlasMeasure = function(opts) {
          var p1 = view.toMap({ x: opts.from[0], y: opts.from[1] });
          var p2 = view.toMap({ x: opts.to[0], y: opts.to[1] });
          if (!p1 || !p2) throw new Error("Pixel coordinates outside map view");
          // Geodesic distance using Haversine
          var lon1 = p1.longitude * Math.PI / 180;
          var lat1 = p1.latitude * Math.PI / 180;
          var lon2 = p2.longitude * Math.PI / 180;
          var lat2 = p2.latitude * Math.PI / 180;
          var dlat = lat2 - lat1;
          var dlon = lon2 - lon1;
          var a = Math.sin(dlat/2) * Math.sin(dlat/2) +
                  Math.cos(lat1) * Math.cos(lat2) * Math.sin(dlon/2) * Math.sin(dlon/2);
          var c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
          var meters = 6371000 * c;
          var feet = meters * 3.28084;
          return {
            from: { pixel: opts.from, lon: p1.longitude, lat: p1.latitude },
            to: { pixel: opts.to, lon: p2.longitude, lat: p2.latitude },
            feet: Math.round(feet * 100) / 100,
            meters: Math.round(meters * 100) / 100,
            miles: Math.round(feet / 5280 * 1000) / 1000
          };
        };

        // --- Identify / Query ---
        window.atlasIdentify = async function(opts) {
          var geometry;

          if (opts.pixel) {
            // Single point identify from screen pixel
            var mapPt = view.toMap({ x: opts.pixel[0], y: opts.pixel[1] });
            if (!mapPt) throw new Error("Pixel outside map view: " + opts.pixel);
            // Buffer the point slightly for hit tolerance
            var res = view.resolution * 5;
            geometry = new Extent({
              xmin: mapPt.x - res, ymin: mapPt.y - res,
              xmax: mapPt.x + res, ymax: mapPt.y + res,
              spatialReference: view.spatialReference
            });
          } else if (opts.bbox) {
            // Rectangle query from pixel coordinates [x1, y1, x2, y2]
            var topLeft = view.toMap({ x: opts.bbox[0], y: opts.bbox[1] });
            var bottomRight = view.toMap({ x: opts.bbox[2], y: opts.bbox[3] });
            if (!topLeft || !bottomRight) throw new Error("Pixel bbox outside map view");
            geometry = new Extent({
              xmin: Math.min(topLeft.x, bottomRight.x),
              ymin: Math.min(topLeft.y, bottomRight.y),
              xmax: Math.max(topLeft.x, bottomRight.x),
              ymax: Math.max(topLeft.y, bottomRight.y),
              spatialReference: view.spatialReference
            });
          } else {
            throw new Error("Provide --pixel or --bbox");
          }

          // Query all visible feature layers
          var results = [];
          var layerPromises = [];
          webmap.allLayers.forEach(function(layer) {
            if (layer.type === "feature" && layer.visible && layer.title && !layer.title.startsWith("_")) {
              layerPromises.push(
                layer.queryFeatures({
                  geometry: geometry,
                  spatialRelationship: "intersects",
                  outFields: opts.fields || ["*"],
                  returnGeometry: false,
                  maxRecordCount: opts.limit || 20
                }).then(function(result) {
                  if (result.features.length > 0) {
                    results.push({
                      layer: layer.title,
                      url: layer.url,
                      count: result.features.length,
                      features: result.features.map(function(f) { return f.attributes; })
                    });
                  }
                }).catch(function(err) {
                  results.push({ layer: layer.title, error: err.message });
                })
              );
            }
          });
          await Promise.all(layerPromises);
          return results;
        };

        // --- Highlight ---
        window.atlasHighlight = async function(opts) {
          if (opts.clear) { highlightLayer.removeAll(); return { cleared: true }; }

          var style = opts.style || {};
          var fillColor = style.color || [255, 255, 0, 0.3];
          var outlineColor = style.outlineColor || [255, 0, 0, 1];
          var outlineWidth = style.outlineWidth || 3;

          var symbol = new SimpleFillSymbol({
            color: new Color(fillColor),
            outline: { color: new Color(outlineColor), width: outlineWidth }
          });

          if (opts.apns && opts.apns.length > 0) {
            var parcelLayer = findParcelLayer();

            var whereClause = opts.apns.map(function(apn) {
              return "asmtnum = '" + apn.replace(/-/g, "").replace(/'/g, "''") + "'";
            }).join(" OR ");

            var query = parcelLayer.createQuery();
            query.where = whereClause;
            query.returnGeometry = true;
            query.outSpatialReference = view.spatialReference;
            var result = await parcelLayer.queryFeatures(query);

            result.features.forEach(function(f) {
              highlightLayer.add(new Graphic({ geometry: f.geometry, symbol: symbol }));
            });

            return { highlighted: result.features.length };
          }

          return { highlighted: 0 };
        };

        // --- Overlay ---
        window.atlasOverlay = async function(opts) {
          if (opts.remove) {
            // Remove overlay by id
            var toRemove = [];
            overlayGroup.graphics.forEach(function(g) {
              if (g.attributes && g.attributes._overlayId === opts.id) toRemove.push(g);
            });
            toRemove.forEach(function(g) { overlayGroup.remove(g); });
            return { removed: toRemove.length };
          }

          var geojson = opts.geojson;
          if (typeof geojson === "string") geojson = JSON.parse(geojson);

          var style = opts.style || {};
          var features = geojson.features || [];
          var count = 0;

          features.forEach(function(feature) {
            var geom = feature.geometry;
            var props = feature.properties || {};
            var graphic;

            if (geom.type === "Point") {
              graphic = new Graphic({
                geometry: new Point({ longitude: geom.coordinates[0], latitude: geom.coordinates[1] }),
                symbol: new SimpleMarkerSymbol({
                  color: new Color(style.color || [255, 0, 0, 0.8]),
                  size: style.size || 8,
                  outline: { color: new Color(style.outlineColor || [0, 0, 0, 1]), width: 1 }
                }),
                attributes: Object.assign({ _overlayId: opts.id }, props)
              });
            } else if (geom.type === "Polygon") {
              graphic = new Graphic({
                geometry: new Polygon({
                  rings: geom.coordinates,
                  spatialReference: { wkid: 4326 }
                }),
                symbol: new SimpleFillSymbol({
                  color: new Color(style.color || [0, 0, 255, 0.3]),
                  outline: { color: new Color(style.outlineColor || [0, 0, 255, 1]), width: 2 }
                }),
                attributes: Object.assign({ _overlayId: opts.id }, props)
              });
            } else if (geom.type === "LineString") {
              graphic = new Graphic({
                geometry: new Polyline({
                  paths: [geom.coordinates],
                  spatialReference: { wkid: 4326 }
                }),
                symbol: new SimpleLineSymbol({
                  color: new Color(style.color || [255, 0, 0, 1]),
                  width: style.width || 2
                }),
                attributes: Object.assign({ _overlayId: opts.id }, props)
              });
            }

            if (graphic) {
              overlayGroup.add(graphic);
              count++;

              // Add label if requested
              if (opts.labelField && props[opts.labelField]) {
                var centroid = graphic.geometry.extent
                  ? graphic.geometry.extent.center
                  : graphic.geometry;
                overlayGroup.add(new Graphic({
                  geometry: centroid,
                  symbol: new TextSymbol({
                    text: String(props[opts.labelField]),
                    color: "black",
                    haloColor: "white",
                    haloSize: 1,
                    font: { size: 10 }
                  }),
                  attributes: { _overlayId: opts.id }
                }));
              }
            }
          });

          await waitForTiles();
          return { added: count };
        };

        // --- Annotate ---
        window.atlasAnnotate = async function(opts) {
          if (opts.clear) { annotationLayer.removeAll(); return { cleared: true }; }

          var annotations = opts.annotations || [];
          var count = 0;

          annotations.forEach(function(ann) {
            var point = new Point({ longitude: ann.position[0], latitude: ann.position[1] });
            var color = ann.color || [255, 0, 0, 1];

            if (ann.type === "text") {
              annotationLayer.add(new Graphic({
                geometry: point,
                symbol: new TextSymbol({
                  text: ann.text || "",
                  color: new Color(color),
                  haloColor: "white",
                  haloSize: 2,
                  font: { size: 14, weight: "bold" }
                })
              }));
              count++;
            } else if (ann.type === "circle") {
              var circle = new Circle({
                center: point,
                radius: ann.radius || 500,
                radiusUnit: "feet"
              });
              annotationLayer.add(new Graphic({
                geometry: circle,
                symbol: new SimpleFillSymbol({
                  color: new Color([color[0], color[1], color[2], 0.2]),
                  outline: { color: new Color(color), width: 2 }
                })
              }));
              count++;
            } else if (ann.type === "arrow" && ann.endPosition) {
              var line = new Polyline({
                paths: [[ann.position, ann.endPosition]],
                spatialReference: { wkid: 4326 }
              });
              annotationLayer.add(new Graphic({
                geometry: line,
                symbol: new SimpleLineSymbol({
                  color: new Color(color),
                  width: 2,
                  marker: { style: "arrow", placement: "end" }
                })
              }));
              count++;
            }
          });

          return { added: count };
        };

        // --- State ---
        window.atlasGetState = function() {
          return {
            webmap: currentWebmapId,
            center: [view.center.longitude, view.center.latitude],
            zoom: view.zoom,
            scale: view.scale,
            extent: {
              xmin: view.extent.xmin, ymin: view.extent.ymin,
              xmax: view.extent.xmax, ymax: view.extent.ymax
            },
            layers: getLayerInfo()
          };
        };
      }, function(err) {
        console.error("MapView FAILED: " + (err.message || err));
        document.title = "ERROR";
      });
    });
  </script>
</body>
</html>
